name: Go

on:
  push:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vanilla-os/pico:main

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y libbtrfs-dev libdevmapper-dev libgpgme-dev pkg-config build-essential libdpkg-dev

      - name: Build
        run: go build -o abrootv2

      - name: Test
        run: go test -v ./tests/...

      - name: Compress
        run: tar -czvf abrootv2.tar.gz abrootv2

      - name: Compress-manpage
        run: tar -czvf abroot-man.tar.gz man/man1/abroot.1

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            abrootv2.tar.gz
            abroot-man.tar.gz

  test:
    name: Integration Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vanilla-os/pico:main
      options: --privileged -it --cap-add ALL
      volumes:
        - /dev:/dev:rslave
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y parted mount kpartx kmod dosfstools libbtrfs-dev libdevmapper-dev libgpgme-dev pkg-config libdpkg-dev

      - name: Extract Build
        run: |
          tar -xzvf artifacts/abrootv2.tar.gz -C .

      - name: Create Virtual Disks Images
        run: |
          dd if=/dev/zero of=vos-var.img bs=1M count=1024
          dd if=/dev/zero of=vos-a.img bs=1M count=1024
          dd if=/dev/zero of=vos-b.img bs=1M count=1024
          dd if=/dev/zero of=vos-boot.img bs=1M count=100
          dd if=/dev/zero of=vos-efi.img bs=1M count=100

      - name: Setup Loop Devices
        id: setup_loop
        run: |
          var_loop=$(losetup -Pf --show vos-var.img)
          echo "var_loop=$var_loop" >> $GITHUB_ENV
          a_loop=$(losetup -Pf --show vos-a.img)
          echo "a_loop=$a_loop" >> $GITHUB_ENV
          b_loop=$(losetup -Pf --show vos-b.img)
          echo "b_loop=$b_loop" >> $GITHUB_ENV
          boot_loop=$(losetup -Pf --show vos-boot.img)
          echo "boot_loop=$boot_loop" >> $GITHUB_ENV
          efi_loop=$(losetup -Pf --show vos-efi.img)
          echo "efi_loop=$efi_loop" >> $GITHUB_ENV

      - name: Create Partitions
        run: |
          parted ${var_loop} mklabel gpt mkpart vos-var ext4 1MiB 100%
          parted ${a_loop} mklabel gpt mkpart vos-a ext4 1MiB 100%
          parted ${b_loop} mklabel gpt mkpart vos-b ext4 1MiB 100%
          parted ${boot_loop} mklabel gpt mkpart vos-boot ext4 1MiB 100%
          parted ${efi_loop} mklabel gpt mkpart vos-efi fat32 1MiB 100%

      - name: Format Partitions
        run: |
          mkfs.ext4 ${var_loop}p1 -L vos-var
          mkfs.ext4 ${a_loop}p1 -L vos-a
          mkfs.ext4 ${b_loop}p1 -L vos-b
          mkfs.ext4 ${boot_loop}p1 -L vos-boot
          mkfs.vfat ${efi_loop}p1 -n vos-efi

      - name: Synchronize Partitions
        run: |
          partprobe
          sleep 2

      - name: Check Loop Devices
        run: |
          losetup -a
          ls -l /dev/disk/by-label

      - name: Test Mount
        run: |
          mount LABEL=vos-var /mnt
          umount /mnt

      - name: List devices
        run: lsblk -J -o "NAME,FSTYPE,LABEL,MOUNTPOINT,UUID"

      - name: Run Integration Test
        run: |
          ./abrootv2 status

  release:
    name: Release
    needs: [test]
    runs-on: ubuntu-latest
    if: github.repository == 'vanilla-os/ABRoot' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: "continuous"
          prerelease: true
          name: "Continuous Build"
          files: |
            abrootv2.tar.gz
            abroot-man.tar.gz
