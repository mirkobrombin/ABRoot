name: Go

on:
  push:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vanilla-os/pico:main

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y libbtrfs-dev libdevmapper-dev libgpgme-dev pkg-config build-essential libdpkg-dev

      - name: Build
        run: go build -o abrootv2

      - name: Test
        run: go test -v ./tests/...

      - name: Compress
        run: tar -czvf abrootv2.tar.gz abrootv2

      - name: Compress-manpage
        run: tar -czvf abroot-man.tar.gz man/man1/abroot.1

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            abrootv2.tar.gz
            abroot-man.tar.gz

  test:
    name: Integration Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vanilla-os/pico:main
      volumes:
        - /dev:/dev:rslave
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y parted mount kpartx kmod dosfstools

      - name: Extract Build
        run: |
          tar -xzvf artifacts/abrootv2.tar.gz -C .

      - name: Create Virtual Disks Images
        run: |
          dd if=/dev/zero of=vos-var.img bs=1M count=1024
          dd if=/dev/zero of=vos-a.img bs=1M count=1024
          dd if=/dev/zero of=vos-b.img bs=1M count=1024
          dd if=/dev/zero of=vos-boot.img bs=1M count=100
          dd if=/dev/zero of=vos-efi.img bs=1M count=100

      - name: Format Virtual Disks Images
        run: |
          mkfs.ext4 vos-var.img -L vos-var
          mkfs.ext4 vos-a.img -L vos-a
          mkfs.ext4 vos-b.img -L vos-b
          mkfs.ext4 vos-boot.img -L vos-boot
          mkfs.vfat vos-efi.img -n vos-efi

      - name: Check Virtual Disks Images
        run: ls -lh *.img

      - name: Setup Loop Devices
        run: |
          losetup -Pf --show vos-var.img
          losetup -Pf --show vos-a.img
          losetup -Pf --show vos-b.img
          losetup -Pf --show vos-boot.img
          losetup -Pf --show vos-efi.img

      - name: Check Loop Devices
        run: |
          for loopdev in $(losetup -l | awk '{print $1}' | grep '/dev/loop'); do
            echo "Label for $loopdev:"
            e2label $loopdev || true
          done

          partprobe
          losetup -a
          ls -l /run/host/dev/disk/by-label

      - name: Inform Kernel
        run: |
          partprobe

      - name: List devices
        run: lsblk -J -o "NAME,FSTYPE,LABEL,MOUNTPOINT,UUID"

      - name: Run Integration Test
        run: |
          ./abrootv2 status

  release:
    name: Release
    needs: [test]
    runs-on: ubuntu-latest
    if: github.repository == 'vanilla-os/ABRoot' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: "continuous"
          prerelease: true
          name: "Continuous Build"
          files: |
            abrootv2.tar.gz
            abroot-man.tar.gz
